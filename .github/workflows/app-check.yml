name: app-check

on: push

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4

      - run: npm install --legacy-peer-deps
      
      - name: Create fallback ESLint config
        run: echo "export default [];" > eslint.config.js

      - name: Run linter
        run: make lint
        env:
          NODE_OPTIONS: "--allow-natives-syntax"
          ESLINT_RC: true

      - name: run tests
        run: npm test