name: app-check

on: push

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4

      - run: npm install --legacy-peer-deps

      - run: npm run lint
        env:
          ESLINT_USE_FLAT_CONFIG: false

      - name: run tests
        run: npm test