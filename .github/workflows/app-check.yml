name: app-check

on: push

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4

      - run: npm install --legacy-peer-deps

      - name: Migrate ESLint config
        run: npx @eslint/migrate-config .eslintrc.json --yes

      - name: Run linter
        run: make lint

      - name: run tests
        run: npm test